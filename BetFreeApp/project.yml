name: BetFreeApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: 16.0
targets:
  BetFreeApp:
    type: application
    platform: iOS
    sources:
      - BetFreeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.BetFreeApp
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_ENTITLEMENTS: BetFreeApp/BetFreeApp.entitlements
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: BetFreeApp/BetFreeApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    capabilities:
      com.apple.applesignin: {}
    dependencies:
      - package: BetFree
packages:
  BetFree:
    path: .. 
name: BetFreeApp
options:
  bundleIdPrefix: com.betfree
  deploymentTarget:
    iOS: 16.0
targets:
  BetFreeApp:
    type: application
    platform: iOS
    sources:
      - BetFreeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.betfree.app
        DEVELOPMENT_TEAM: ""  # Leave this empty for automatic team selection
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: BetFreeApp/BetFreeApp.entitlements
    entitlements:
      path: BetFreeApp/BetFreeApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    capabilities:
      com.apple.applesignin: {}
    dependencies:
      - package: BetFree
        product: BetFree
packages:
  BetFree:
    path: ..
    group: Dependencies
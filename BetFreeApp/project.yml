name: BetFreeApp
options:
  bundleIdPrefix: com.betfree
  deploymentTarget:
    iOS: 16.0
targets:
  BetFreeApp:
    type: application
    platform: iOS
    sources:
      - path: BetFreeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.betfree.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: BetFree
        product: BetFree
packages:
  BetFree:
    path: ..